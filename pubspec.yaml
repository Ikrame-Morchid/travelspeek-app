# ══════════════════════════════════════════════════════
# TravelSpeek - Application touristique intelligente
# ══════════════════════════════════════════════════════

name: travelspeek_app
description: Application mobile pour découvrir les monuments touristiques avec IA

publish_to: 'none'
version: 1.0.0+1

# ══════════════════════════════════════════════════════
# ENVIRONNEMENT
# ══════════════════════════════════════════════════════

environment:
  sdk: ">=3.0.0 <4.0.0"

# ══════════════════════════════════════════════════════
# DÉPENDANCES
# ══════════════════════════════════════════════════════

dependencies:
  flutter:
    sdk: flutter

  # ────────────────────────────────────────────────────
  # 🌍 LOCALISATION & INTERNATIONALISATION
  # ────────────────────────────────────────────────────
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # ────────────────────────────────────────────────────
  # 🗄️ BASE DE DONNÉES & STORAGE
  # ────────────────────────────────────────────────────
  
  # Isar - Base de données locale (cache traductions)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  
  # SQLite - Base de données conversations (historique chatbot)
  sqflite: ^2.3.0              # ✅ NOUVEAU pour historique
  
  # Path Provider
  path_provider: ^2.1.2
  path: ^1.8.3                 # ✅ Dépendance de sqflite

  # ────────────────────────────────────────────────────
  # 💾 PRÉFÉRENCES & STOCKAGE SÉCURISÉ
  # ────────────────────────────────────────────────────
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # ────────────────────────────────────────────────────
  # 🌐 RÉSEAU & API
  # ────────────────────────────────────────────────────
  http: ^1.6.0
  dio: ^5.4.0

  # ────────────────────────────────────────────────────
  # 🔄 GESTION D'ÉTAT
  # ────────────────────────────────────────────────────
  provider: ^6.1.1
  flutter_bloc: ^8.1.4

  # ────────────────────────────────────────────────────
  # 🎨 UI & DESIGN
  # ────────────────────────────────────────────────────
  
  # Animations
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  
  # Images & Cache
  cached_network_image: ^3.3.1
  
  # Icons
  font_awesome_flutter: ^10.7.0
  
  # Carousel
  carousel_slider: ^5.0.0
  
  # URL Launcher
  url_launcher: ^6.2.2

  # ────────────────────────────────────────────────────
  # 📸 CAMÉRA & IMAGES
  # ────────────────────────────────────────────────────
  image_picker: ^1.1.2
  camera: ^0.10.5+9
  permission_handler: ^11.1.0

  # ────────────────────────────────────────────────────
  # 🎤 AUDIO & TRADUCTION VOCALE
  # ────────────────────────────────────────────────────
  
  # Enregistrement audio
  flutter_sound: ^9.2.13
  
  # Lecture audio
  audioplayers: ^5.2.1

  # ────────────────────────────────────────────────────
  # 🔔 NOTIFICATIONS
  # ────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # ────────────────────────────────────────────────────
  # 🆔 UTILITAIRES
  # ────────────────────────────────────────────────────
  uuid: ^4.1.0                 # ✅ NOUVEAU pour IDs conversations

# ══════════════════════════════════════════════════════
# DÉPENDANCES DE DÉVELOPPEMENT
# ══════════════════════════════════════════════════════

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generators
  build_runner: ^2.4.7
  isar_generator: ^3.1.0+1

  # Linting
  flutter_lints: ^3.0.1

# ══════════════════════════════════════════════════════
# CONFIGURATION FLUTTER
# ══════════════════════════════════════════════════════

flutter:
  generate: true
  uses-material-design: true

  # ── Assets ────────────────────────────────────────────
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  # ── Fonts ─────────────────────────────────────────────
  # Décommentez si vous avez des polices personnalisées
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700

# ══════════════════════════════════════════════════════
# NOTES D'INSTALLATION
# ══════════════════════════════════════════════════════
#
# 1. Après modification de ce fichier, exécutez :
#    flutter pub get
#
# 2. Pour générer le code Isar :
#    flutter pub run build_runner build
#
# 3. Pour nettoyer le cache de build :
#    flutter clean && flutter pub get
#
# 4. Permissions Android (AndroidManifest.xml) :
#    - INTERNET
#    - RECORD_AUDIO
#    - CAMERA
#    - READ_EXTERNAL_STORAGE
#    - WRITE_EXTERNAL_STORAGE
#
# 5. Permissions iOS (Info.plist) :
#    - NSMicrophoneUsageDescription
#    - NSCameraUsageDescription
#    - NSPhotoLibraryUsageDescription
#
# ══════════════════════════════════════════════════════